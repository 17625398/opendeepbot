# 评估框架配置
# Evaluation Framework Configuration

skill:
  name: evaluation
  display_name: "评估框架"
  description: "定义评估指标、评分标准和测试方法"
  version: "1.0.0"
  enabled: true

# 评估指标
metrics:
  # 准确性指标
  accuracy:
    enabled: true
    
    measures:
      - name: "exact_match"
        weight: 0.3
        threshold: 0.9
        
      - name: "semantic_similarity"
        weight: 0.4
        threshold: 0.85
        model: "sentence-transformers/all-MiniLM-L6-v2"
        
      - name: "f1_score"
        weight: 0.3
        threshold: 0.8

  # 性能指标
  performance:
    enabled: true
    
    measures:
      - name: "latency"
        weight: 0.4
        threshold_ms: 2000
        target_ms: 1000
        
      - name: "throughput"
        weight: 0.3
        threshold: 10  # requests per second
        target: 50
        
      - name: "resource_usage"
        weight: 0.3
        max_cpu_percent: 80
        max_memory_mb: 512

  # 质量指标
  quality:
    enabled: true
    
    measures:
      - name: "coherence"
        weight: 0.25
        threshold: 0.8
        
      - name: "relevance"
        weight: 0.25
        threshold: 0.85
        
      - name: "completeness"
        weight: 0.25
        threshold: 0.8
        
      - name: "fluency"
        weight: 0.25
        threshold: 0.85

  # 安全性指标
  safety:
    enabled: true
    
    measures:
      - name: "toxicity"
        weight: 0.4
        threshold: 0.1
        
      - name: "bias"
        weight: 0.3
        threshold: 0.15
        
      - name: "privacy"
        weight: 0.3
        threshold: 0.95

# 评分标准
scoring:
  # 评分范围
  range:
    min: 0
    max: 100
    
  # 等级划分
  grades:
    - name: "excellent"
      min_score: 90
      color: "green"
      
    - name: "good"
      min_score: 80
      color: "light_green"
      
    - name: "acceptable"
      min_score: 70
      color: "yellow"
      
    - name: "poor"
      min_score: 60
      color: "orange"
      
    - name: "failed"
      min_score: 0
      color: "red"

  # 通过阈值
  pass_threshold: 70
  
  # 权重配置
  weights:
    accuracy: 0.35
    performance: 0.25
    quality: 0.25
    safety: 0.15

# 评估方法
methods:
  # 自动评估
  automatic:
    enabled: true
    
    techniques:
      - name: "rule_based"
        enabled: true
        
      - name: "model_based"
        enabled: true
        model: "gpt-4"
        
      - name: "embedding_based"
        enabled: true
        
      - name: "statistical"
        enabled: true

  # 人工评估
  human:
    enabled: true
    
    config:
      min_evaluators: 3
      consensus_threshold: 0.7
      evaluation_criteria:
        - clarity
        - helpfulness
        - accuracy
        - tone

  # A/B 测试
  ab_testing:
    enabled: true
    
    config:
      min_sample_size: 1000
      confidence_level: 0.95
      min_improvement: 0.05

# 测试数据集
datasets:
  # 内置数据集
  built_in:
    - name: "general_qa"
      size: 1000
      categories:
        - factual
        - reasoning
        - creative
        
    - name: "code_generation"
      size: 500
      languages:
        - python
        - javascript
        - java
        
    - name: "conversation"
      size: 800
      types:
        - single_turn
        - multi_turn
        - context_aware

  # 自定义数据集
  custom:
    enabled: true
    max_size: 10000
    supported_formats:
      - json
      - csv
      - jsonl

# 报告配置
reporting:
  # 报告格式
  format: "html"
  
  # 包含内容
  include:
    - summary
    - detailed_metrics
    - comparisons
    - recommendations
    - visualizations
  
  # 可视化
  visualizations:
    enabled: true
    types:
      - bar_chart
      - line_chart
      - radar_chart
      - confusion_matrix
  
  # 导出选项
  export:
    formats:
      - json
      - csv
      - pdf
      - html

# 持续评估
continuous:
  enabled: true
  
  # 评估频率
  frequency:
    unit: "daily"
    time: "02:00"
    
  # 触发条件
  triggers:
    - model_update
    - data_update
    - schedule
    
  # 告警配置
  alerts:
    enabled: true
    channels:
      - email
      - slack
    conditions:
      - metric_drop: 0.1
      - score_below: 70
