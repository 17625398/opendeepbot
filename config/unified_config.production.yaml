# DeepTutor 生产环境配置
# 覆盖默认配置中的开发环境设置

environment: "production"
debug: false

# ==================== 生产环境路径配置 ====================
paths:
  data_dir: "/var/lib/deeptutor/data"
  logs_dir: "/var/log/deeptutor"
  temp_dir: "/tmp/deeptutor"

# ==================== 生产环境 LLM 配置 ====================
llm:
  providers:
    openai:
      timeout: 120
      max_retries: 5
    
    anthropic:
      timeout: 120
      max_retries: 5

# ==================== 生产环境缓存配置 ====================
cache:
  l1:
    enabled: true
    capacity: 5000
    ttl: 600  # 10分钟
  l2:
    enabled: true
    capacity: 50000
    ttl: 7200  # 2小时

# ==================== 生产环境 Agent 配置 ====================
agents:
  solve:
    timeout: 300  # 5分钟
    max_retries: 5
  
  research:
    timeout: 600  # 10分钟
    max_retries: 5

# ==================== 生产环境日志配置 ====================
logging:
  level: "WARNING"
  save_to_file: true
  console_output: false
  file_rotation: true
  max_file_size: "100MB"
  backup_count: 10

# ==================== 生产环境安全配置 ====================
security:
  access_token_expire_minutes: 15  # 更短的 token 有效期
  enable_mfa: true  # 启用多因素认证
  allowed_hosts:
    - "api.deeptutor.ai"
    - "app.deeptutor.ai"
  cors_origins:
    - "https://app.deeptutor.ai"
